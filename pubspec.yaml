name: reflecta_daily
description: Reflecta Daily — Tu espejo espiritual diario con IA
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.1.0
  firebase_storage: ^12.1.0
  flutter_riverpod: ^2.5.1
  go_router: ^14.1.0
  dio: ^5.4.3
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  equatable: ^2.0.5
  dartz: ^0.10.1
  shared_preferences: ^2.2.3
  intl: ^0.19.0
  uuid: ^4.4.0
  logger: ^2.4.0
  speech_to_text: ^6.6.2
  permission_handler: ^11.3.1
  flutter_dotenv: ^6.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - .env
    - .env
    - assets/images/
    - assets/icons/
    - assets/animations/
